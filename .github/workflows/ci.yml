name: StarryAI CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python Dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Pytest (backend)
        run: >
          python -m pytest -q backend/tests
          -k "not repo_main_prints_backend_hint and not frontend_build_succeeds"

      - name: Ruff
        run: python -m ruff check backend/app backend/tests backend/scripts

      - name: Mypy
        run: python -m mypy backend/app

  frontend:
    name: Frontend Unit + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci --prefix frontend

      - name: Vitest
        run: npm run test --prefix frontend

      - name: Build
        run: npm run build --prefix frontend

  frontend-e2e-smoke:
    name: Frontend E2E Smoke
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright Chromium
        run: npx --prefix frontend playwright install --with-deps chromium

      - name: Playwright E2E
        run: npm run test:e2e --prefix frontend

  perf-smoke:
    name: Backend Perf Smoke
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python Dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Perf Smoke
        run: >
          python backend/scripts/run_perf_baseline.py
          --runs-per-scenario 1
          --concurrency 1
          --soak-seconds 0
          --output artifacts/perf/ci_perf_smoke.json

      - name: Assert Perf Artifact
        run: test -f artifacts/perf/ci_perf_smoke.json

      - name: Upload Perf Artifact
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-report
          path: artifacts/perf/ci_perf_smoke.json

